name: CampusHub CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # -----------------------------------------------
  # Job 1: 代码风格检查（ESLint）
  # -----------------------------------------------
  lint:
    name: 代码风格检查 (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行 ESLint
        run: npm run lint

  # -----------------------------------------------
  # Job 2: 构建检查
  # -----------------------------------------------
  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # -----------------------------------------------
  # Job 3: 单元测试
  # -----------------------------------------------
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行测试
        run: npm run test --if-present
